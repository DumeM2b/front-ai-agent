name: Notify by Email on PR

on:
  pull_request:
    types: [opened, reopened, closed, ready_for_review]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send email notification
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.sendgrid.net
          server_port: 587
          secure: false
          username: apikey
          password: ${{ secrets.SENDGRID_API_KEY }}
          subject: "[GitHub] PR #${{ github.event.pull_request.number }} — ${{ github.event.pull_request.title }}"
          to: ${{ secrets.MAIL_TO }}
          from: GitHub Actions <${{ secrets.MAIL_FROM }}>
          html_body: |
            <h2>🔔 Pull Request — ${{ github.event.action }}</h2>
            <table>
              <tr><td><b>Repo</b></td><td>${{ github.repository }}</td></tr>
              <tr><td><b>PR</b></td><td>#${{ github.event.pull_request.number }} — ${{ github.event.pull_request.title }}</td></tr>
              <tr><td><b>Auteur</b></td><td>${{ github.event.pull_request.user.login }}</td></tr>
              <tr><td><b>Branche</b></td><td>${{ github.event.pull_request.head.ref }} → ${{ github.event.pull_request.base.ref }}</td></tr>
              <tr><td><b>Statut</b></td><td>${{ github.event.action }}</td></tr>
            </table>
            <br>
            <a href="${{ github.event.pull_request.html_url }}" style="padding:10px 20px;background:#0078d4;color:white;text-decoration:none;border-radius:4px;">
              Voir la Pull Request
            </a>
